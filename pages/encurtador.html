<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>ByteCurto</title>

    <link rel="stylesheet" href="./css/encurtador.css">

</head>

<body>

<div class="container">

    <img src="./img/logoByteCurto.png"
    class="logo">

    <h1>ByteCurto</h1>

    <p>
        Encurte seus links rapidamente.
    </p>

    <div class="box-url">

        <input
        type="text"
        placeholder="Cole sua URL aqui">

        <button>
            Encurtar
        </button>

    </div>

    <div class="resultado">

        <p>
            Seu link curto:
        </p>

        <div class="link-box">

            <span>
                bytecurto.com/a8F91x
            </span>

            <button>
                Copiar
            </button>

        </div>

    </div>

</div>
</body>
<script type="module" src="/js/pages/encurtador.js"></script>
</html>
